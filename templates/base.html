<!DOCTYPE html>
<html>
<head>
    <title>Indian Bakery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold" href="/">Indian Bakery</a>

        <div>
            <a href="/" class="nav-link d-inline text-light">Home</a>
            <a href="/products" class="nav-link d-inline text-light">Products</a>

            {% if session.get('user_id') %}
                <a href="/cart" class="nav-link d-inline text-light">Cart</a>
                <a href="/profile" class="nav-link d-inline text-light">Profile</a>

                {% if session.get('is_admin') %}
                    <a href="/admin" class="nav-link d-inline text-warning">Admin</a>
                {% endif %}

                <a href="/logout" class="nav-link d-inline text-danger">Logout</a>
            {% else %}
                <a href="/login" class="nav-link d-inline text-light">Login</a>
                <a href="/register" class="nav-link d-inline text-light">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
