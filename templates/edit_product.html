{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-4">Edit Product</h2>

<div class="card-dark">
    <form method="POST">
        <input type="text" name="name" value="{{ product[1] }}" class="form-control mb-2" required>
        <input type="number" step="0.01" name="price" value="{{ product[2] }}" class="form-control mb-2" required>
        <input type="text" name="image" value="{{ product[3] }}" class="form-control mb-2" required>
        <button class="btn btn-orange w-100">Update Product</button>
    </form>
</div>

{% endblock %}
